name: Test & Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # lint removed: golangci-lint does not yet support Go 1.25 — use `make lint` locally
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests with race detector
        run: go test ./... -short -timeout 120s -race -covermode=atomic -coverprofile=coverage.out
      - name: Coverage summary
        run: go tool cover -func=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...

  build-android:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: false
      - name: Build Android .so (arm64-v8a, armeabi-v7a, x86_64)
        run: make android ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Upload android-libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-libs
          path: build/android/

  build-ios:
    runs-on: macos-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build iOS .a
        run: make ios
      - name: Upload ios-lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-lib
          path: build/ios/
